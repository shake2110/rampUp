name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Validate App Startup (Syntax Check)
        run: |
          cd backend
          python -m py_compile main.py
      - name: Verify Backend Integrity
        run: |
          cd backend
          # Basic dry run of main.py if possible, or just syntax check
          python -c "import main; print('Backend syntax OK')"

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Dependencies
        run: |
          cd frontend
          npm install
      - name: Build Frontend
        run: |
          cd frontend
          # We skip lint in CI to ensure speed, focusing on build validity
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8001
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  deploy-info:
    needs: [backend-check, frontend-check]
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Instructions
        run: |
          echo "CI Checks Passed!"
          echo "Next Steps: Connect your GitHub repository to Vercel (for ./frontend) and Railway (for ./backend)."
